spring:
  application:
    name: taxi-platform-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxi}
    username: ${SPRING_DATASOURCE_USERNAME:taxi}
    password: ${SPRING_DATASOURCE_PASSWORD:taxi}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080

taxi:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-32bytes-min}
    expiration-minutes: 60
  dispatch:
    search-radius-km: 5.0
    offer-timeout-seconds: 15
    offer-sweep-interval-ms: 2000
  admin:
    seed-enabled: ${ADMIN_SEED_ENABLED:true}
    email: ${ADMIN_EMAIL:admin@taxi.local}
    password: ${ADMIN_PASSWORD:AdminSecret123}
    full-name: ${ADMIN_FULL_NAME:Platform Admin}
  cors:
    # 5173 = admin dashboard, 5174/5175 = Taksi Go website
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
